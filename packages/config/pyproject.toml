[project]
name = "cognitio-config"
version = "0.1.0"
description = "Cognitio Layer 0 — typed application settings shared by API and worker."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cognitio_config"]
