[project]
name = "cognitio-connectors"
version = "0.1.0"
description = "Cognitio Layer 2 — capability-aware source connectors."
requires-python = ">=3.12"
dependencies = [
    "cognitio-storage",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cognitio_connectors"]
