[project]
name = "cognitio-extraction"
version = "0.1.0"
description = "Cognitio Layer 4 — Claude structured extraction and evidence verification."
requires-python = ">=3.12"
dependencies = [
    "cognitio-storage",
    "anthropic>=0.52",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cognitio_extraction"]
