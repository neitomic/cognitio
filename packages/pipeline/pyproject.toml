[project]
name = "cognitio-pipeline"
version = "0.1.0"
description = "Cognitio Layer 3 — typed jobs and asynchronous worker orchestration."
requires-python = ">=3.12"
dependencies = [
    "cognitio-storage",
    "cognitio-connectors",
    "cognitio-extraction",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cognitio_pipeline"]
