[project]
name = "cognitio-query"
version = "0.1.0"
description = "Cognitio Layer 6 — ACL-filtered semantic search and graph traversal."
requires-python = ">=3.12"
dependencies = [
    "cognitio-storage",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cognitio_query"]
