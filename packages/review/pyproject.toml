[project]
name = "cognitio-review"
version = "0.1.0"
description = "Cognitio Layer 5 — review lifecycle, promotion, and conflict handling."
requires-python = ">=3.12"
dependencies = [
    "cognitio-storage",
    "cognitio-extraction",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cognitio_review"]
