# Alembic configuration for cognitio-storage.
#
# The database URL is NOT stored here; env.py reads it from DATABASE_URL (falling back to
# TEST_DATABASE_URL) so the same migrations target dev, test, and CI without edits.
# `%(here)s` pins script_location to this file's directory regardless of the working dir.

[alembic]
script_location = %(here)s/src/cognitio_storage/migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
